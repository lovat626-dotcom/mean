<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>樂命咖啡｜包場預約日曆</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif; background: #f7f3ec; color: #3b2f2f; }
    header { padding: 28px 20px 16px; text-align: center; }
    header h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
    main { width: min(1060px, 100%); margin: 0 auto; padding: 16px; display: grid; grid-template-columns: 1.25fr 0.75fr; gap: 20px; }
    .card { background: #fffaf2; border: 1px solid #eadfce; border-radius: 24px; box-shadow: 0 12px 30px rgba(80, 60, 40, 0.08); padding: 20px; }
    .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    button { border: none; background: #8b5e3c; color: white; border-radius: 999px; padding: 10px 16px; cursor: pointer; font-size: 14px; transition: 0.2s; }
    button:hover:not(:disabled) { background: #724a2f; }
    .month-title { font-weight: 700; font-size: 20px; text-align: center; flex: 1; }
    .weekdays, .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .weekdays div { text-align: center; font-size: 13px; color: #8b7a6f; padding: 8px 0; }
    .day { min-height: 76px; border-radius: 16px; background: #fff; border: 1px solid #eee1d2; padding: 8px; cursor: pointer; text-align: left; }
    .day:hover:not(.disabled) { outline: 2px solid #c79b73; }
    .day.disabled { opacity: 0.35; cursor: not-allowed; background: #f2ede6; }
    .day-number { font-weight: 700; font-size: 14px; }
    .status { margin-top: 8px; display: inline-block; font-size: 12px; padding: 3px 8px; border-radius: 999px; background: #e4f4df; color: #3d7b35; }
    .selected { outline: 3px solid #8b5e3c; }
    .side-title { margin: 0 0 12px; font-size: 22px; }
    .selected-date { padding: 12px; background: #fff; border-radius: 16px; margin-bottom: 16px; color: #6f5c4d; line-height: 1.5; font-weight: bold; }
    label { display: block; margin: 14px 0 6px; font-size: 14px; font-weight: 700; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 14px; border: 1px solid #ddcdbd; background: white; font-size: 15px; margin-bottom: 8px; }
    textarea { resize: vertical; min-height: 80px; }
    .notice { font-size: 13px; color: #8b7a6f; line-height: 1.6; margin-top: 12px; }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } .day { min-height: 58px; padding: 6px; } }
  </style>
</head>
<body>
  <header>
    <h1>樂命咖啡｜包場預約</h1>
  </header>

  <main>
    <section class="card">
      <div class="calendar-header">
        <button type="button" id="prevMonth">上一月</button>
        <div class="month-title" id="monthTitle"></div>
        <button type="button" id="nextMonth">下一月</button>
      </div>
      <div class="weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
      <div class="days" id="days"></div>
    </section>

    <section class="card">
      <h2 class="side-title">預約資料</h2>
      <div class="selected-date" id="selectedDateText">請先選擇日期</div>

      <form action="請填入你的_Formspree_網址" method="POST">
        
        <input type="hidden" id="hiddenDate" name="預約日期" value="" required>

        <label>包場時段</label>
        <select name="預約時段" required>
          <option value="">請選擇時段</option>
          <option value="上午包場｜10:00 - 13:00">上午包場｜10:00 - 13:00</option>
          <option value="下午包場｜14:00 - 17:00">下午包場｜14:00 - 17:00</option>
          <option value="晚上包場｜18:00 - 21:00">晚上包場｜18:00 - 21:00</option>
        </select>

        <label>姓名</label>
        <input name="姓名" type="text" placeholder="請輸入姓名" required />
        
        <label>電話</label>
        <input name="電話" type="tel" placeholder="例如：0912345678" required />
        
        <label>LINE ID</label>
        <input name="LINE_ID" type="text" placeholder="請輸入 LINE ID" required />
        
        <label>備註</label>
        <textarea name="備註" placeholder="例如：人數、活動類型、是否需要餐點"></textarea>

        <p class="notice">送出後，我們會盡快透過電話或 LINE 與您聯繫確認。</p>
        <button type="submit" style="width: 100%;">送出預約表單</button>
      </form>
    </section>
  </main>

  <script>
    let currentDate = new Date();
    let selectedDate = null;

    const monthTitle = document.getElementById("monthTitle");
    const daysEl = document.getElementById("days");
    const selectedDateText = document.getElementById("selectedDateText");
    const hiddenDateInput = document.getElementById("hiddenDate");

    document.getElementById("prevMonth").addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
    document.getElementById("nextMonth").addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      monthTitle.textContent = `${year} 年 ${month + 1} 月`;
      daysEl.innerHTML = "";

      for (let i = 0; i < firstDay.getDay(); i++) {
        daysEl.appendChild(document.createElement("div"));
      }

      for (let day = 1; day <= lastDay.getDate(); day++) {
        const date = new Date(year, month, day);
        const dateString = formatDate(date);

        const dayEl = document.createElement("button");
        dayEl.type = "button";
        dayEl.className = `day ${date < today ? "disabled" : ""} ${selectedDate && formatDate(selectedDate) === dateString ? "selected" : ""}`;
        dayEl.innerHTML = `<div class="day-number">${day}</div><span class="status">可預約</span>`;

        if (date >= today) {
          dayEl.addEventListener("click", () => {
            selectedDate = date;
            selectedDateText.textContent = `已選擇日期：${dateString}`;
            hiddenDateInput.value = dateString; // 把日期塞進隱藏欄位準備送出
            renderCalendar();
          });
        }
        daysEl.appendChild(dayEl);
      }
    }
    renderCalendar();
  </script>
</body>
</html>
